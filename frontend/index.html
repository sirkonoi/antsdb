<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>antsdb.org</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="./css/main.css">

    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>

  <body>
    <div class="top-nav">
      <!--<a class="active" href="home">Home</a>-->
    </div>

    <div class="main-content">
      <div class="main-title">
        <img src="./imgs/logo.png" alt="AntsDB logo" class="logo">
        <span>antsdb</span>
      </div>

      <h2 class="sub-title">Open, simple, free, community based wiki-style database for ants</h2>  

      <div class="search">
        <input type="text" class="searchTerm" placeholder="Search...">

          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </div>
